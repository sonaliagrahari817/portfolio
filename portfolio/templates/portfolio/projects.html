{% extends 'portfolio/base.html' %}
{% block content %}

<section class="page-hero">
    <h1>My <span class="highlight">Projects</span></h1>
    <p>Things I've built and am proud of</p>
</section>

<section class="projects-grid">
    {% for project in projects %}
    <div class="project-card">
        <div class="project-top" style="background: {{ project.color }}20; border-left: 4px solid {{ project.color }};">
            <div class="project-icon" style="color: {{ project.color }}">
                <i class="fas fa-laptop-code"></i>
            </div>
            <h3>{{ project.title }}</h3>
        </div>
        <div class="project-body">
            <p>{{ project.description }}</p>
            <div class="tech-tags">
                {% for tech in project.tech.split %}
                <span class="tech-tag">{{ tech }}</span>
                {% endfor %}
            </div>
            <a href="{{ project.github }}" class="btn btn-outline btn-sm" target="_blank">
                <i class="fab fa-github"></i> View Code
            </a>
        </div>
    </div>
    {% endfor %}
</section>

{% endblock %}
